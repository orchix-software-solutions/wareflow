services:
  postgres:
    image: postgres:16-alpine
    container_name: wareflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wareflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wareflow}
      POSTGRES_DB: ${POSTGRES_DB:-wareflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wareflow} -d ${POSTGRES_DB:-wareflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wareflow

  redis:
    image: redis:7-alpine
    container_name: wareflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wareflow

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wareflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-wareflow}:${POSTGRES_PASSWORD:-wareflow}@postgres:5432/${POSTGRES_DB:-wareflow}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - wareflow

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-WareFlow}
    container_name: wareflow-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Server-side rewrite target — Next proxies /api/* to the API container
      API_ORIGIN: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - wareflow

volumes:
  postgres_data:
  redis_data:

networks:
  wareflow:
    driver: bridge
